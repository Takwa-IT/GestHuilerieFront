<mat-card class="olive-card">
  <mat-card-header>
    <mat-card-title>Stock - Mouvements et historique</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="actions">
      <a mat-raised-button color="primary" [routerLink]="['/pages/stock/form']">Nouveau mouvement</a>
    </div>

    <form class="filters" [formGroup]="filterForm">
      <mat-form-field appearance="outline">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
          <mat-option value="ALL">Tous</mat-option>
          <mat-option value="ARRIVAL">Entree</mat-option>
          <mat-option value="DEPARTURE">Sortie</mat-option>
          <mat-option value="TRANSFER">Transfert</mat-option>
          <mat-option value="ADJUSTMENT">Ajustement</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Reference lot</mat-label>
        <input matInput type="number" formControlName="referenceId" />
      </mat-form-field>
    </form>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Reference</th>
            <th>Quantite</th>
            <th>Date</th>
            <th>Commentaire</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of movements">
            <td>{{ m.id }}</td>
            <td><span class="badge" [ngClass]="movementClass(m.typeMouvement)">{{ movementLabel(m.typeMouvement)
                }}</span></td>
            <td>{{ m.referenceId }}</td>
            <td>{{ m.quantite }}</td>
            <td>{{ m.dateMouvement }}</td>
            <td>{{ m.commentaire }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </mat-card-content>
</mat-card>
