<nb-card>
  <nb-card-header>Gestion des Matieres Premieres</nb-card-header>
  <nb-card-body>
    <form class="entity-form" [formGroup]="rawMaterialForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input nbInput fullWidth formControlName="nom" placeholder="Nom" />
      </div>

      <div class="form-group">
        <label class="form-label">Type *</label>
        <input nbInput fullWidth formControlName="type" placeholder="Type" />
      </div>

      <div class="form-group">
        <label class="form-label">Unite de mesure *</label>
        <input nbInput fullWidth formControlName="uniteMesure" placeholder="kg, litre..." />
      </div>

      <div class="form-group description-field">
        <label class="form-label">Description *</label>
        <input nbInput fullWidth formControlName="description" placeholder="Description" />
      </div>

      <div class="form-actions">
        <button nbButton status="primary" type="submit">
          {{ editingId ? 'Mettre a jour' : 'Creer' }}
        </button>
        <button *ngIf="editingId" nbButton status="basic" outline type="button" (click)="resetForm()">Annuler</button>
      </div>
    </form>

    <div class="table-wrap">
      <table class="crud-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Type</th>
            <th>Unite</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of rawMaterials">
            <td>{{ item.idMatierePremiere }}</td>
            <td>{{ item.nom }}</td>
            <td>{{ item.type }}</td>
            <td>{{ item.uniteMesure }}</td>
            <td>{{ item.description }}</td>
            <td class="actions">
              <button nbButton ghost status="primary" size="small" type="button" (click)="edit(item)" title="Modifier"
                aria-label="Modifier">
                <nb-icon icon="edit-outline"></nb-icon>
              </button>
              <button nbButton ghost status="danger" size="small" type="button" (click)="remove(item)" title="Supprimer"
                aria-label="Supprimer">
                <nb-icon icon="trash-2-outline"></nb-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>


  </nb-card-body>
</nb-card>
