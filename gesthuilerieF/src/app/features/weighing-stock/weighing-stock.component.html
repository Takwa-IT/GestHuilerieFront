<nb-card>
  <nb-card-header>Gestion Pesée & Stocks</nb-card-header>
  <nb-card-body>
    <div class="table">
      <div class="row head"><span>Réception</span><span>Poids brut</span><span>Tare</span><span>Net</span><span>Stock</span></div>
      <div class="row" *ngFor="let i of weighings">
        <span>{{ i.ref }}</span><span>{{ i.gross }}</span><span>{{ i.tare }}</span><span>{{ i.net }}</span><span>{{ i.stock }}</span>
      </div>
    </div>
  </nb-card-body>
</nb-card>
